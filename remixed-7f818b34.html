  {n:"Netherlands",f:"🇳🇱"},{n:"Norway",f:"🇳🇴"},{n:"Portugal",f:"🇵🇹"},{n:"Scotland",f:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
  {n:"Spain",f:"🇪🇸"},{n:"Sweden",f:"🇸🇪"},{n:"Switzerland",f:"🇨🇭"},{n:"Turkey",f:"🇹🇷"}
];
var FLAG_CODES={
  "Canada":"ca","Mexico":"mx","United States":"us","Australia":"au","Iran":"ir","Iraq":"iq",
  "Japan":"jp","Jordan":"jo","Qatar":"qa","Saudi Arabia":"sa","South Korea":"kr","Uzbekistan":"uz",
  "Algeria":"dz","Cabo Verde":"cv","DR Congo":"cd","Côte d'Ivoire":"ci","Egypt":"eg","Ghana":"gh",

};
function getFlag(country,size){
  size=size||28;
  var code=FLAG_CODES[country];
  var c=null;
  for(var i=0;i<COUNTRIES.length;i++){if(COUNTRIES[i].n===country){c=COUNTRIES[i];break;}}
  var emoji=c?c.f:"🏳";
  if(!code)return'<span style="font-size:'+size+'px;line-height:1">'+emoji+'</span>';
  return'<img src="https://flagcdn.com/w40/'+code+'.png" width="'+size+'" height="'+Math.round(size*0.75)+'" style="border-radius:3px;object-fit:cover;vertical-align:middle" alt="'+country+'">';
}

var ADMIN_CODE="GRG-ADMIN";
var STAGES={
  group:{label:"Group Stage",win:3,draw:1},

  sf:{label:"Semi-final",win:16,draw:0},
  final:{label:"Final",win:20,draw:0}
};
var GOAL_PT=1;

var SEED=[
  {name:"Adam",               country:"Australia"},
  {name:"Alex",               country:"Haiti"},
  {name:"Alexandra Schöner",  country:"Saudi Arabia"},
  {name:"Amer",               country:"Japan"},
  {name:"Andi Oberhauser",    country:"Uruguay"},
  {name:"Detlev",             country:"Sweden"},
  {name:"Florian",            country:"Iran"},
  {name:"Geoff Risi",         country:"Canada"},
  {name:"Julia",              country:"Colombia"},
  {name:"Julie",              country:"England"},
  {name:"Klaus",              country:"Scotland"},
  {name:"Robert",             country:"Turkey"},
  {name:"Sabine",             country:"Belgium"},
  {name:"Tyler",              country:"Côte d'Ivoire"},
  {name:"Viktoria Salzbrunn", country:"United States"}
];

var STATE={participants:[],log:[]};
var IS_ADMIN=false;
var activeTab="table";
var pickedStage="group";
var logFilter="all";
var lastSnap="";
var mfb={};
var editingId=null;
var syncLines=[];

function sGet(k,sh){
  if(!window.storage)return Promise.resolve(mfb[k]||null);
  return window.storage.get(k,sh).then(function(r){return r?r.value:null;}).catch(function(){return mfb[k]||null;});
}
function sSet(k,v,sh){
  mfb[k]=v;
  if(!window.storage)return Promise.resolve();
  return window.storage.set(k,v,sh).catch(function(){});
}

function findCountry(name){
  for(var i=0;i<COUNTRIES.length;i++){if(COUNTRIES[i].n===name)return COUNTRIES[i];}
  return null;
}

function loadState(){
  return sGet("tournament",true).then(function(raw){
    if(raw){
      try{var parsed=JSON.parse(raw);if(parsed&&typeof parsed==="object")STATE=parsed;}catch(e){}
    }
    if(!STATE.participants)STATE.participants=[];
    if(!STATE.log)STATE.log=[];
    // Migration: ensure every SEED person exists (never wipes existing data)
    var changed=false;
    for(var i=0;i<SEED.length;i++){
      var s=SEED[i];
      var exists=false;
      for(var j=0;j<STATE.participants.length;j++){
        if(STATE.participants[j].name.toLowerCase()===s.name.toLowerCase()){exists=true;break;}
      }
      if(!exists){
        var c=findCountry(s.country);
        STATE.participants.push({id:"p_"+i+"_"+Math.floor(Math.random()*100000),name:s.name,country:s.country,flag:c?c.f:"🏳",points:0});
        changed=true;
      }
    }
    var p1=changed?saveState():Promise.resolve();
    return p1.then(function(){return sGet("admin",false);}).then(function(adm){IS_ADMIN=(adm==="yes");});
  });
}
function saveState(){
  lastSnap=JSON.stringify(STATE);
  return sSet("tournament",lastSnap,true);
}

function usedCountries(){return STATE.participants.map(function(p){return p.country;});}
function byPoints(){
  return STATE.participants.slice().sort(function(a,b){
    if(b.points!==a.points)return b.points-a.points;
    return a.name.localeCompare(b.name);
  });
}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtTime(ts){
  if(!ts)return"";
  var d=new Date(ts);
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+' '+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

function applyAdmin(){
  var tabs=document.querySelectorAll(".adminOnly");
  for(var i=0;i<tabs.length;i++)tabs[i].style.display=IS_ADMIN?"inline-block":"none";
  var p=document.getElementById("adminPill");
  if(p)p.style.display=IS_ADMIN?"block":"none";
}

/* ===== WIRING ===== */
function wireAll(){
  var tabs=document.querySelectorAll(".tab");
  for(var i=0;i<tabs.length;i++){
    (function(t){t.onclick=function(){activeTab=t.getAttribute("data-tab");showTab(activeTab);};})(tabs[i]);
  }
  var el;
  el=document.getElementById("joinBtn");if(el)el.onclick=doJoin;
  el=document.getElementById("joinName");if(el)el.onkeydown=function(e){if(e.key==="Enter")doJoin();};
  el=document.getElementById("refreshBtn");if(el)el.onclick=function(){loadState().then(function(){render();showTab("table");});};
  var lfs=document.querySelectorAll("[data-lf]");
  for(var a=0;a<lfs.length;a++){
    (function(b){b.onclick=function(){logFilter=b.getAttribute("data-lf");render();showTab("games");};})(lfs[a]);
  }
  var uds=document.querySelectorAll("[data-undo]");
  for(var u=0;u<uds.length;u++){
    (function(b){b.onclick=function(){undoByIdx(parseInt(b.getAttribute("data-undo"),10));};})(uds[u]);
  }
  var sps=document.querySelectorAll("#stagePick button");
  for(var s=0;s<sps.length;s++){
    (function(b){b.onclick=function(){
      pickedStage=b.getAttribute("data-stage");
      var all=document.querySelectorAll("#stagePick button");
      for(var x=0;x<all.length;x++)all[x].classList.toggle("on",all[x].getAttribute("data-stage")===pickedStage);
    };})(sps[s]);
  }
  el=document.getElementById("recordBtn");if(el)el.onclick=recordResult;
  var eds=document.querySelectorAll("[data-edit]");
  for(var e1=0;e1<eds.length;e1++){
    (function(b){b.onclick=function(){editingId=b.getAttribute("data-edit");render();showTab("manage");};})(eds[e1]);
  }
  var rms=document.querySelectorAll("[data-remove]");
  for(var r1=0;r1<rms.length;r1++){
    (function(b){b.onclick=function(){removeParticipant(b.getAttribute("data-remove"));};})(rms[r1]);
  }
  el=document.getElementById("resetBtn");if(el)el.onclick=resetAll;
  el=document.getElementById("syncBtn");if(el)el.onclick=doSync;
  el=document.getElementById("adminBtn");if(el)el.onclick=unlockAdmin;
  el=document.getElementById("adminCode");if(el)el.onkeydown=function(e){if(e.key==="Enter")unlockAdmin();};
  el=document.getElementById("signoutBtn");if(el)el.onclick=signOut;
  el=document.getElementById("editCancel");if(el)el.onclick=function(){editingId=null;render();showTab("manage");};
  el=document.getElementById("editSave");if(el)el.onclick=saveEdit;
  el=document.getElementById("editModal");
  if(el)el.onclick=function(e){if(e.target===el){editingId=null;render();showTab("manage");}};
}

function showTab(name){
  if((name==="result"||name==="manage"||name==="sync")&&!IS_ADMIN)name="table";
  activeTab=name;
  var tabs=document.querySelectorAll(".tab");
  for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle("active",tabs[i].getAttribute("data-tab")===name);
  var views=document.querySelectorAll(".view");
  for(var j=0;j<views.length;j++)views[j].classList.remove("active");
  var v=document.getElementById("v-"+name);
  if(v)v.classList.add("active");
}

/* ===== ACTIONS ===== */
function doJoin(){
  var inp=document.getElementById("joinName");
  var name=inp.value.trim();
  if(!name)return msg("joinMsg","Please enter your name first.","err");
  for(var i=0;i<STATE.participants.length;i++){
    if(STATE.participants[i].name.toLowerCase()===name.toLowerCase())
      return msg("joinMsg","Someone called "+esc(name)+" has already joined.","err");
  }
  var used=usedCountries();
  var pool=COUNTRIES.filter(function(c){return used.indexOf(c.n)<0;});
  if(!pool.length)return msg("joinMsg","Every nation has been drawn — the pot is empty.","err");
  var pick=pool[Math.floor(Math.random()*pool.length)];
  STATE.participants.push({id:"p_"+Date.now()+"_"+Math.floor(Math.random()*9999),name:name,country:pick.n,flag:pick.f,points:0});
  saveState().then(function(){
    inp.value="";
    document.getElementById("joinMsg").innerHTML="";
    document.getElementById("joinReveal").innerHTML='<div class="reveal">'+
      '<div class="pot">The pot has chosen…</div>'+
      '<div style="margin:10px 0 6px;display:inline-block;animation:drawIn 0.7s cubic-bezier(.2,.8,.25,1.4) both">'+getFlag(pick.n,92)+'</div>'+
      '<div class="ctry">'+esc(pick.n)+'</div>'+
      '<div class="who"><b>'+esc(name)+'</b>, you\'re playing for '+esc(pick.n)+'!</div></div>';
    fireConfetti();
  });
}

function recordResult(){
  var aId=document.getElementById("teamA").value;
  var bId=document.getElementById("teamB").value;
  var aScore=parseInt(document.getElementById("scoreA").value,10);
  var bScore=parseInt(document.getElementById("scoreB").value,10);
  if(!aId||!bId)return msg("resultMsg","Select both nations.","err");
  if(aId===bId)return msg("resultMsg","A nation can't play itself.","err");
  if(isNaN(aScore)||isNaN(bScore)||aScore<0||bScore<0)return msg("resultMsg","Enter a valid score.","err");
  var st=STAGES[pickedStage];
  if(pickedStage!=="group"&&aScore===bScore)
    return msg("resultMsg",st.label+" matches can't be level — enter result after ET/pens.","err");
  addResult(aId,bId,aScore,bScore,pickedStage,false,null);
  saveState().then(function(){
    msg("resultMsg","Result logged successfully.","ok");
    document.getElementById("scoreA").value=0;
    document.getElementById("scoreB").value=0;
    fireConfetti();
  });
}

function findP(id){
  for(var i=0;i<STATE.participants.length;i++){if(STATE.participants[i].id===id)return STATE.participants[i];}
  return null;
}

function addResult(aId,bId,aScore,bScore,stage,auto,matchId){
  var st=STAGES[stage]||STAGES.group;
  var A=findP(aId),B=findP(bId);
  if(!A||!B)return;
  var aPts=aScore*GOAL_PT,bPts=bScore*GOAL_PT;
  if(aScore>bScore)aPts+=st.win;
  else if(bScore>aScore)bPts+=st.win;
  else{aPts+=st.draw;bPts+=st.draw;}
  A.points+=aPts;B.points+=bPts;
  STATE.log.push({stage:stage,aId:aId,bId:bId,aScore:aScore,bScore:bScore,aPts:aPts,bPts:bPts,
    aCountry:A.country,bCountry:B.country,aName:A.name,bName:B.name,t:Date.now(),auto:!!auto,matchId:matchId||null});
}

function undoByIdx(idx){
  if(idx<0||idx>=STATE.log.length)return;
  if(!confirm("Undo this result? Points will be reversed."))return;
  var g=STATE.log[idx];
  var A=findP(g.aId),B=findP(g.bId);
  if(A)A.points-=g.aPts;
  if(B)B.points-=g.bPts;
  STATE.log.splice(idx,1);
  saveState().then(function(){render();showTab("games");});
}

/* ===== AUTO SYNC ===== */
function doSync(){
  var btn=document.getElementById("syncBtn");
  var statusEl=document.getElementById("syncStatus");
  var logEl=document.getElementById("syncLog");
  if(btn){btn.disabled=true;btn.textContent="⏳ Fetching…";}
  if(statusEl)statusEl.innerHTML='<span class="dot"></span>Searching…';

  var nations=STATE.participants.map(function(p){return p.country+" ("+p.name+")";}).join(", ");
  var logged=STATE.log.filter(function(g){return g.auto&&g.matchId;}).map(function(g){return g.matchId;});

  var prompt="You are a World Cup 2026 results assistant. Today is "+new Date().toDateString()+".\n\n"+
    "The FIFA World Cup 2026 is in progress. Search the web for completed (full-time) World Cup 2026 matches.\n\n"+
    "Sweepstake nations: "+nations+"\n\n"+
    "Return ONLY a valid JSON array of completed matches involving ANY of these nations. Each object:\n"+
    '{"matchId":"HOME_vs_AWAY_YYYY-MM-DD","home":"country name","away":"country name","homeScore":0,"awayScore":0,"stage":"group"}\n\n'+
    'stage must be one of: group, r32, r16, qf, sf, final.\n'+
    "Rules: Only FULLY COMPLETED matches. Skip these already-logged IDs: "+JSON.stringify(logged)+"\n"+
    "Return [] if nothing new. ONLY the JSON array, no explanation, no markdown.";

  var newLines=[];
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]
    })
  }).then(function(resp){return resp.json();})
  .then(function(data){
    var text="";
    if(data&&data.content){
      for(var i=0;i<data.content.length;i++){
        if(data.content[i].type==="text")text+=data.content[i].text;
      }
    }
    if(!text)throw new Error("No response from AI");
    text=text.replace(/```json|```/gi,"").trim();
    var start=text.indexOf("["),end=text.lastIndexOf("]");
    if(start===-1||end===-1)throw new Error("No results data found");
    var matches=JSON.parse(text.slice(start,end+1));
    if(!matches.length){
      newLines.push('<span class="skip">No new completed matches found.</span>');
    }else{
      var added=0;
      for(var m=0;m<matches.length;m++){
        var match=matches[m];
        var A=null,B=null;
        for(var p=0;p<STATE.participants.length;p++){
          var pp=STATE.participants[p];
          if(match.home&&pp.country.toLowerCase()===match.home.toLowerCase())A=pp;
          if(match.away&&pp.country.toLowerCase()===match.away.toLowerCase())B=pp;
        }
        if(!A&&!B){continue;}
        var dup=false;
        if(match.matchId){
          for(var l=0;l<STATE.log.length;l++){if(STATE.log[l].matchId===match.matchId){dup=true;break;}}
        }
        if(dup){newLines.push('<span class="skip">⏭ Already logged: '+esc(match.home)+' '+match.homeScore+'–'+match.awayScore+' '+esc(match.away)+'</span>');continue;}
        if(A&&B){
          addResult(A.id,B.id,match.homeScore,match.awayScore,match.stage||"group",true,match.matchId);
          var last=STATE.log[STATE.log.length-1];
          newLines.push('<span class="added">✅ '+esc(A.country)+' '+match.homeScore+'–'+match.awayScore+' '+esc(B.country)+' → '+esc(A.name)+' +'+last.aPts+', '+esc(B.name)+' +'+last.bPts+'</span>');
        }else{
          var real=A||B;
          var realScore=A?match.homeScore:match.awayScore;
          var oppScore=A?match.awayScore:match.homeScore;
          var oppName=A?match.away:match.home;
          var st=STAGES[match.stage]||STAGES.group;
          var pts=realScore*GOAL_PT;
          if(realScore>oppScore)pts+=st.win;
          else if(realScore===oppScore)pts+=st.draw;
          real.points+=pts;
          STATE.log.push({stage:match.stage||"group",aId:real.id,bId:"ext",aScore:realScore,bScore:oppScore,
            aPts:pts,bPts:0,aCountry:real.country,bCountry:oppName,aName:real.name,bName:"",t:Date.now(),auto:true,matchId:match.matchId||null});
          newLines.push('<span class="added">✅ '+esc(real.country)+' '+realScore+'–'+oppScore+' '+esc(oppName)+' → '+esc(real.name)+' +'+pts+'pts</span>');
        }
        added++;
      }
      if(added===0)newLines.push('<span class="skip">All found matches were already logged.</span>');
      else{newLines.push('<span class="added">— '+added+' new result'+(added===1?'':'s')+' added —</span>');fireConfetti();}
    }
    STATE.lastSync=Date.now();
    return saveState();
  })
  .then(function(){
    if(statusEl)statusEl.innerHTML='<span class="dot"></span>Last sync: just now';
  })
  .catch(function(err){
    newLines.push('<span class="warn">⚠ '+esc(err.message)+'</span>');
    if(statusEl)statusEl.innerHTML='<span class="dotOff"></span>Sync failed';
  })
  .then(function(){
    syncLines=newLines.concat(syncLines).slice(0,50);
    if(logEl)logEl.innerHTML=syncLines.join('<br>');
    if(btn){btn.disabled=false;btn.textContent="⚡ Sync now";}
  });
}

function saveEdit(){
  var p=findP(editingId);
  if(!p)return;
  var newName=document.getElementById("editName").value.trim();
  var newCountry=document.getElementById("editCountry").value;
  var newPoints=parseInt(document.getElementById("editPoints").value,10);
  if(!newName)return msg("editMsg","Name can't be empty.","err");
  if(!newCountry)return msg("editMsg","Select a nation.","err");
  for(var i=0;i<STATE.participants.length;i++){
    var o=STATE.participants[i];
    if(o.id!==editingId&&o.name.toLowerCase()===newName.toLowerCase())
      return msg("editMsg","Another participant already has that name.","err");
  }
  var c=findCountry(newCountry);
  p.name=newName;p.country=newCountry;p.flag=c?c.f:p.flag;
  if(!isNaN(newPoints))p.points=Math.max(0,newPoints);
  for(var l=0;l<STATE.log.length;l++){
    var g=STATE.log[l];
    if(g.aId===p.id){g.aCountry=p.country;g.aName=p.name;}
    if(g.bId===p.id){g.bCountry=p.country;g.bName=p.name;}
  }
  saveState().then(function(){
    editingId=null;render();showTab("manage");
    setTimeout(function(){msg("manageMsg","Changes saved.","ok");},50);
  });
}

function removeParticipant(id){
  var p=findP(id);
  if(!p)return;
  if(!confirm("Remove "+p.name+" ("+p.country+")?"))return;
  STATE.participants=STATE.participants.filter(function(x){return x.id!==id;});
  saveState().then(function(){render();showTab("manage");});
}

function resetAll(){
  if(!confirm("Reset the ENTIRE tournament? All data will be wiped and re-seeded."))return;
  if(!confirm("Are you absolutely sure?"))return;
  STATE={participants:[],log:[]};
  for(var i=0;i<SEED.length;i++){
    var s=SEED[i];
    var c=findCountry(s.country);
    STATE.participants.push({id:"p_"+i+"_"+Math.floor(Math.random()*100000),name:s.name,country:s.country,flag:c?c.f:"🏳",points:0});
  }
  saveState().then(function(){render();showTab("manage");
    setTimeout(function(){msg("manageMsg","Tournament reset & re-seeded with "+SEED.length+" participants.","info");},50);});
}

function unlockAdmin(){
  if(document.getElementById("adminCode").value.trim()===ADMIN_CODE){
    IS_ADMIN=true;
    sSet("admin","yes",false).then(function(){render();showTab("manage");});
  }else msg("adminMsg","That code isn't right.","err");
}
function signOut(){
  IS_ADMIN=false;
  sSet("admin","no",false).then(function(){render();showTab("admin");});
}

function msg(id,text,type){
  var el=document.getElementById(id);
  if(!el)return;
  el.innerHTML='<div class="msg '+type+'">'+text+'</div>';
  if(type!=="err")setTimeout(function(){if(el)el.innerHTML="";},7000);
}

function fireConfetti(){
  var cv=document.getElementById("confetti");
  if(!cv)return;
  var ctx=cv.getContext("2d");
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  var cols=["#F2C14E","#1FB873","#EAF2EC","#169063","#C99A2E"];
  var pts=[];
  for(var i=0;i<120;i++){
    pts.push({x:window.innerWidth/2+(Math.random()-.5)*100,y:window.innerHeight*.32,
      vx:(Math.random()-.5)*11,vy:Math.random()*-13-4,r:Math.random()*6+3,
      c:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6,vr:(Math.random()-.5)*.4,life:0});
  }
  var fr=0;
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    var alive=false;
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.vy+=.4;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
      if(p.y<window.innerHeight+30)alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
      ctx.globalAlpha=Math.max(0,1-p.life/90);ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);ctx.restore();
    }
    fr++;
    if(alive&&fr<130)requestAnimationFrame(tick);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  tick();
}

function poll(){
  sGet("tournament",true).then(function(raw){
    if(raw&&raw!==lastSnap){
      lastSnap=raw;
      try{var parsed=JSON.parse(raw);if(parsed)STATE=parsed;}catch(e){}
      if(!STATE.participants)STATE.participants=[];
      if(!STATE.log)STATE.log=[];
      if(activeTab==="table"){
        var lb=document.getElementById("lbList");
        if(lb)lb.innerHTML=renderRows(byPoints());
      }
      if(activeTab==="games"){
        var g=document.getElementById("gamesLog");
        if(g){
          var log=STATE.log.slice().reverse();
          if(logFilter!=="all")log=log.filter(function(x){return x.stage===logFilter;});
          g.innerHTML=renderGameCards(log);
        }
      }
    }
  });
}

/* ===== INIT ===== */
loadState().then(function(){
  lastSnap=JSON.stringify(STATE);
  render();
  showTab("table");
  setInterval(poll,6000);
}).catch(function(err){
  document.getElementById("root").innerHTML='<div style="font-family:sans-serif;color:#E2574C;text-align:center;padding:60px 20px">Failed to load: '+err.message+'<br><br><button onclick="location.reload()" style="padding:10px 20px;cursor:pointer">Retry</button></div>';
});

})();
</script>
