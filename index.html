<title>GRG World Cup 2026 Sweepstake</title>
<style>

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg)}
  body{font-family:var(--body);color:var(--text);min-height:100vh;background:radial-gradient(at 50% -10%,rgba(31,184,115,.10),transparent 55%),repeating-linear-gradient(180deg,var(--bg) 0 46px,var(--bg2) 46px 92px);-webkit-font-smoothing:antialiased}
  .wrap{max-width:740px;margin:0 auto;padding:24px 18px 60px}
  .scoreboard{border:1px solid var(--lineSoft);border-radius:16px;background:linear-gradient(180deg,var(--panel2),var(--panel));padding:22px 22px 18px;margin-bottom:18px;position:relative;overflow:hidden}
  .eyebrow{font-family:var(--display);text-transform:uppercase;letter-spacing:.28em;font-size:12px;color:var(--grass);font-weight:600}
  .title{font-family:var(--display);font-weight:700;font-size:38px;line-height:1;text-transform:uppercase;margin:4px 0 2px}
  .title .gold{color:var(--gold)}
  .tagline{color:var(--muted);font-size:13px}
  .adminPill{position:absolute;top:18px;right:18px;font-family:var(--display);text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:600;padding:5px 11px;border-radius:999px;border:1px solid var(--goldDim);color:var(--gold);background:rgba(242,193,78,.08);display:none}
  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .tab{font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-size:13px;font-weight:500;padding:9px 16px;border-radius:10px;border:1px solid var(--lineSoft);background:var(--panel);color:var(--muted);cursor:pointer;transition:all .15s}
  .tab:hover{color:var(--text);border-color:var(--line)}
  .tab.active{background:var(--grassDim);color:#fff;border-color:var(--grass)}
  .tab.adminOnly{display:none}
  .panel{border:1px solid var(--lineSoft);border-radius:14px;background:var(--panel);padding:22px}
  .view{display:none}.view.active{display:block}
  h3{font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-weight:600;font-size:17px;margin-bottom:4px}
  .hint{color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.5}
  label.fld{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 6px;font-weight:500}
  input,select{width:100%;padding:11px 13px;font-size:15px;font-family:var(--body);border-radius:10px;border:1px solid var(--lineSoft);background:var(--bg2);color:var(--text)}
  input:focus,select:focus{outline:none;border-color:var(--grass)}
  select option{background:var(--panel)}
  button.btn{width:100%;padding:13px;cursor:pointer;font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-weight:600;font-size:15px;border-radius:10px;border:none;background:var(--grass);color:#06180F}
  button.btn:hover{filter:brightness(1.08)}
  button.btn.gold{background:var(--gold);color:#2A1E00}
  button.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--lineSoft)}
  button.btn.ghost:hover{border-color:var(--line);background:var(--panel2)}
  button.btn.danger{background:transparent;border:1px solid rgba(226,87,76,.5);color:var(--danger)}
  button.btn.danger:hover{background:rgba(226,87,76,.12)}
  button.btn:disabled{opacity:.45;cursor:not-allowed}
  .msg{font-size:13px;padding:10px 13px;border-radius:10px;margin-top:12px;line-height:1.45}
  .msg.ok{background:rgba(31,184,115,.13);color:#7DE6B6;border:1px solid rgba(31,184,115,.3)}
  .msg.err{background:rgba(226,87,76,.12);color:#F2A199;border:1px solid rgba(226,87,76,.35)}
  .msg.info{background:rgba(242,193,78,.10);color:var(--gold);border:1px solid rgba(242,193,78,.3)}
  .reveal{margin-top:18px;text-align:center;border:1px solid var(--lineSoft);border-radius:16px;background:radial-gradient(at 50% 0%,rgba(31,184,115,.12),transparent 70%),var(--bg2);padding:28px 20px}
  .reveal .pot{font-family:var(--display);text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--grass)}
  .reveal .ctry{font-family:var(--display);font-weight:700;font-size:30px;text-transform:uppercase}
  .reveal .who{color:var(--muted);font-size:14px;margin-top:6px}
  .reveal .who b{color:var(--gold)}
  @keyframes drawIn{0%{transform:scale(.2) rotate(-180deg);opacity:0}60%{transform:scale(1.15) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  .lb{display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1px solid var(--lineSoft);background:var(--bg2)}

  .row .who2 .nm .country{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .row .pts{font-family:var(--display);font-weight:700;font-size:26px;color:var(--grass)}
  .row .pts small{font-size:11px;color:var(--muted);display:block;text-align:right;letter-spacing:.1em;font-weight:500}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}
  .vs{display:grid;grid-template-columns:1fr 64px 1fr;gap:10px;align-items:end}
  .vs .score input{text-align:center;font-family:var(--display);font-size:22px;padding:9px 4px}
  .vs .dash{text-align:center;font-family:var(--display);font-size:26px;color:var(--muted);padding-bottom:8px}
  .stagePick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .stagePick button{flex:1;min-width:78px;padding:8px 6px;cursor:pointer;font-family:var(--display);text-transform:uppercase;font-size:12px;font-weight:500;border-radius:8px;border:1px solid var(--lineSoft);background:var(--bg2);color:var(--muted)}
  .stagePick button.on{background:var(--grassDim);color:#fff;border-color:var(--grass)}
  .manageRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px;border-radius:10px;background:var(--bg2);border:1px solid var(--lineSoft);margin-bottom:8px}
  .manageRow .info{display:flex;align-items:center;gap:10px;font-size:14px;min-width:0;flex:1}
  .manageRow .country{color:var(--muted);font-size:12px}
  .manageRow .actions{display:flex;gap:6px;flex-shrink:0}
  .icoBtn{background:transparent;border:1px solid var(--lineSoft);color:var(--muted);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;white-space:nowrap}
  .icoBtn:hover{border-color:var(--line);color:var(--text)}
  .icoBtn.edit{border-color:rgba(242,193,78,.4);color:var(--gold)}
  .xBtn{background:transparent;border:1px solid rgba(226,87,76,.4);color:var(--danger);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px}
  .modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
  .modalBg.open{display:flex}
  .modal{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:24px;width:100%;max-width:420px}
  .modal h3{margin-bottom:14px}
  .modal .field{margin-bottom:14px}
  .modalBtns{display:flex;gap:10px;margin-top:18px}
  .modalBtns button{flex:1}
  .gameCard{background:var(--bg2);border:1px solid var(--lineSoft);border-radius:12px;padding:13px 16px}
  .gameCard .gcTop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .gameCard .gcStage{font-family:var(--display);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--grass);font-weight:600}
  .gameCard .gcTime{font-size:11px;color:var(--muted)}
  .gameCard .gcMatch{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .gameCard .gcTeam{display:flex;align-items:center;gap:8px}
  .gameCard .gcTeam.away{flex-direction:row-reverse;text-align:right}
  .gameCard .gcScore{text-align:center}
  .gameCard .gcScore .sc{font-family:var(--display);font-size:28px;font-weight:700;line-height:1}
  .gameCard .gcScore .pts{font-size:11px;color:var(--muted);margin-top:3px}
  .gameCard .gcAdmin{display:flex;gap:6px;justify-content:flex-end;margin-top:10px;border-top:1px solid var(--lineSoft);padding-top:10px}
  .gamesLog{display:flex;flex-direction:column;gap:10px}
  .logFilters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .logFilters button{padding:6px 12px;font-family:var(--display);text-transform:uppercase;font-size:11px;font-weight:500;border-radius:8px;border:1px solid var(--lineSoft);background:var(--bg2);color:var(--muted);cursor:pointer}
  .logFilters button.on{background:var(--grassDim);color:#fff;border-color:var(--grass)}
  .syncPanel{border:1px solid rgba(242,193,78,.3);border-radius:14px;background:linear-gradient(135deg,rgba(242,193,78,.07),rgba(31,184,115,.05));padding:18px 20px;margin-bottom:16px}
  .syncPanel h4{font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-size:14px;color:var(--gold);margin-bottom:6px}
  .syncPanel p{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px}
  .syncRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .syncRow .btn{width:auto;padding:10px 18px;font-size:13px}
  .syncStatus{font-size:12px;color:var(--muted);flex:1;min-width:120px}
  .syncStatus .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--grass);box-shadow:0 0 6px var(--grass);margin-right:6px;vertical-align:middle}
  .syncStatus .dotOff{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin-right:6px;vertical-align:middle}
  .syncLog{margin-top:14px;font-size:12px;color:var(--muted);background:var(--bg2);border-radius:10px;padding:12px;max-height:180px;overflow-y:auto;line-height:1.8;border:1px solid var(--lineSoft)}
  .syncLog .added{color:#7DE6B6}.syncLog .skip{color:var(--muted)}.syncLog .warn{color:var(--gold)}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:14px}
  .bar .grow{flex:1}
  .sync2{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
  .sync2 .led{width:7px;height:7px;border-radius:50%;background:var(--grass);box-shadow:0 0 8px var(--grass)}
  .divider{height:1px;background:var(--lineSoft);margin:20px 0;border:none}
  .scoring{font-size:13px;color:var(--muted);line-height:1.9}
  .scoring b{color:var(--gold);font-family:var(--display)}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  #loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
  #loadingScreen .spinner{width:40px;height:40px;border:3px solid var(--lineSoft);border-top-color:var(--grass);border-radius:50%;animation:spin 0.8s linear infinite}
  #loadingScreen p{color:var(--muted);font-size:14px;font-family:var(--body)}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
(function(){
"use strict";

// ── Firebase config ──────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyDDgv3qz60woyoygy97-ELAn__Wax7x8Yo",

var db = firebase.database();

// ── Data ─────────────────────────────────────────────────────────
var COUNTRIES=[

  {n:"Senegal",f:"🇸🇳"},{n:"South Africa",f:"🇿🇦"},{n:"Tunisia",f:"🇹🇳"},
  {n:"Curaçao",f:"🇨🇼"},{n:"Haiti",f:"🇭🇹"},{n:"Panama",f:"🇵🇦"},
  {n:"Argentina",f:"🇦🇷"},{n:"Brazil",f:"🇧🇷"},{n:"Colombia",f:"🇨🇴"},{n:"Ecuador",f:"🇪🇨"},
  {n:"Paraguay",f:"🇵🇾"},{n:"Uruguay",f:"🇺🇾"},{n:"New Zealand",f:"🇳🇿"},
  {n:"Austria",f:"🇦🇹"},{n:"Belgium",f:"🇧🇪"},{n:"Bosnia & Herzegovina",f:"🇧🇦"},{n:"Croatia",f:"🇭🇷"},
  {n:"Czechia",f:"🇨🇿"},{n:"England",f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{n:"France",f:"🇫🇷"},{n:"Germany",f:"🇩🇪"},
  {n:"Netherlands",f:"🇳🇱"},{n:"Norway",f:"🇳🇴"},{n:"Portugal",f:"🇵🇹"},{n:"Scotland",f:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
  {n:"Spain",f:"🇪🇸"},{n:"Sweden",f:"🇸🇪"},{n:"Switzerland",f:"🇨🇭"},{n:"Turkey",f:"🇹🇷"}
];
var FLAG_CODES={
  "Canada":"ca","Mexico":"mx","United States":"us","Australia":"au","Iran":"ir","Iraq":"iq",
  "Japan":"jp","Jordan":"jo","Qatar":"qa","Saudi Arabia":"sa","South Korea":"kr","Uzbekistan":"uz",
  "Algeria":"dz","Cabo Verde":"cv","DR Congo":"cd","Côte d'Ivoire":"ci","Egypt":"eg","Ghana":"gh",

  "Norway":"no","Portugal":"pt","Scotland":"gb-sct","Spain":"es","Sweden":"se","Switzerland":"ch","Turkey":"tr"
};
var SEED=[
  {name:"Adam",               country:"Australia"},
  {name:"Alex",               country:"Haiti"},
  {name:"Alexandra Schöner",  country:"Saudi Arabia"},
  {name:"Amer",               country:"Japan"},
  {name:"Andi Oberhauser",    country:"Uruguay"},

];
var ADMIN_CODE="GRG-ADMIN";
var STAGES={
  group:{label:"Group Stage",win:3,draw:1},
  r32:{label:"Round of 32",win:5,draw:0},
  r16:{label:"Round of 16",win:8,draw:0},
  qf:{label:"Quarter-final",win:12,draw:0},
  sf:{label:"Semi-final",win:16,draw:0},
  final:{label:"Final",win:20,draw:0}
};
var GOAL_PT=1;

var STATE={participants:[],log:[]};
var IS_ADMIN=false;

var pickedStage="group";
var logFilter="all";

var syncLines=[];
var saving=false;

// ── Firebase helpers ─────────────────────────────────────────────
function saveState(){
  saving=true;
  return stateRef.set(STATE).then(function(){saving=false;}).catch(function(e){saving=false;console.error(e);});
}

function loadState(){
  return stateRef.once('value').then(function(snap){
    var val=snap.val();
    if(val && val.participants){
      STATE=val;
      if(!STATE.log)STATE.log=[];
    } else {
      // First load — seed everyone
      STATE={participants:[],log:[]};
      for(var i=0;i<SEED.length;i++){
        var s=SEED[i],c=findCountry(s.country);
        STATE.participants.push({id:"p"+i,name:s.name,country:s.country,flag:c?c.f:"🏳",points:0});
      }
    }
    // Migration: add anyone missing from seed
    var changed=false;
    for(var j=0;j<SEED.length;j++){
      var sd=SEED[j],found=false;
      for(var k=0;k<STATE.participants.length;k++){
        if(STATE.participants[k].name.toLowerCase()===sd.name.toLowerCase()){found=true;break;}
      }
      if(!found){
        var cc=findCountry(sd.country);
        STATE.participants.push({id:"pmig"+j+"_"+Date.now(),name:sd.name,country:sd.country,flag:cc?cc.f:"🏳",points:0});
        changed=true;
      }
    }
    IS_ADMIN=(localStorage.getItem('grg_admin')==='yes');
    if(changed)return saveState();
  });
}

// Live updates — re-render table & games when Firebase changes
function startLiveSync(){
  stateRef.on('value',function(snap){
    if(saving)return;
    var val=snap.val();
    if(!val)return;
    STATE=val;
    if(!STATE.participants)STATE.participants=[];
    if(!STATE.log)STATE.log=[];
    if(activeTab==="table"){var lb=document.getElementById("lbList");if(lb)lb.innerHTML=renderRows(byPoints());}
    if(activeTab==="games"){refreshGamesView();}
  });
}

// ── Utility ──────────────────────────────────────────────────────
function findCountry(name){for(var i=0;i<COUNTRIES.length;i++){if(COUNTRIES[i].n===name)return COUNTRIES[i];}return null;}
function findP(id){for(var i=0;i<STATE.participants.length;i++){if(STATE.participants[i].id===id)return STATE.participants[i];}return null;}
function usedCountries(){return STATE.participants.map(function(p){return p.country;});}
function byPoints(){return STATE.participants.slice().sort(function(a,b){return b.points!==a.points?b.points-a.points:a.name.localeCompare(b.name);});}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtTime(ts){if(!ts)return"";var d=new Date(ts);return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+' '+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}
function getFlag(country,size){
  size=size||28;
  var code=FLAG_CODES[country];
  var c=findCountry(country);
  var emoji=c?c.f:"🏳";
  if(!code)return'<span style="font-size:'+size+'px;line-height:1">'+emoji+'</span>';
  return'<img src="https://flagcdn.com/w40/'+code+'.png" width="'+size+'" height="'+Math.round(size*0.75)+'" style="border-radius:3px;object-fit:cover;vertical-align:middle" alt="'+esc(country)+'">';
}

// ── Render ───────────────────────────────────────────────────────
function render(){
  var root=document.getElementById("root");
  root.style.display="block";
  document.getElementById("loadingScreen").style.display="none";
  root.innerHTML=
    '<div class="wrap">'+
      '<div class="scoreboard">'+
        '<div class="adminPill" id="adminPill">★ Admin</div>'+
        '<div class="eyebrow">Office Sweepstake · GRG</div>'+
        '<div class="title">World Cup <span class="gold">2026</span></div>'+
        '<div class="tagline">Draw a nation · climb the table · lift the trophy.</div>'+
      '</div>'+
      '<div class="tabs">'+
        '<button class="tab" data-tab="join">Join</button>'+
        '<button class="tab" data-tab="table">Table</button>'+
        '<button class="tab" data-tab="games">Games</button>'+

// ── Wiring ───────────────────────────────────────────────────────
function wireAll(){
  var tabs=document.querySelectorAll(".tab");
  for(var i=0;i<tabs.length;i++){(function(t){t.onclick=function(){activeTab=t.getAttribute("data-tab");showTab(activeTab);};})(tabs[i]);}
  var el;
  el=document.getElementById("joinBtn");if(el)el.onclick=doJoin;
  el=document.getElementById("joinName");if(el)el.onkeydown=function(e){if(e.key==="Enter")doJoin();};
  el=document.getElementById("recordBtn");if(el)el.onclick=recordResult;
  var sps=document.querySelectorAll("#stagePick button");
  for(var s=0;s<sps.length;s++){(function(b){b.onclick=function(){
    pickedStage=b.getAttribute("data-stage");
    var all=document.querySelectorAll("#stagePick button");
    for(var x=0;x<all.length;x++)all[x].classList.toggle("on",all[x].getAttribute("data-stage")===pickedStage);
  };})(sps[s]);}
  var lfs=document.querySelectorAll("[data-lf]");
  for(var l=0;l<lfs.length;l++){(function(b){b.onclick=function(){logFilter=b.getAttribute("data-lf");render();showTab("games");};})(lfs[l]);}
  wireUndoButtons();
  var eds=document.querySelectorAll("[data-edit]");
  for(var e=0;e<eds.length;e++){(function(b){b.onclick=function(){editingId=b.getAttribute("data-edit");render();showTab("manage");};})(eds[e]);}
  var rms=document.querySelectorAll("[data-remove]");
  for(var r=0;r<rms.length;r++){(function(b){b.onclick=function(){removeParticipant(b.getAttribute("data-remove"));};})(rms[r]);}
  el=document.getElementById("resetBtn");if(el)el.onclick=resetAll;
  el=document.getElementById("syncBtn");if(el)el.onclick=doSync;
  el=document.getElementById("adminBtn");if(el)el.onclick=unlockAdmin;
  el=document.getElementById("adminCode");if(el)el.onkeydown=function(e){if(e.key==="Enter")unlockAdmin();};
  el=document.getElementById("signoutBtn");if(el)el.onclick=signOut;
  el=document.getElementById("editCancel");if(el)el.onclick=function(){editingId=null;render();showTab("manage");};
  el=document.getElementById("editSave");if(el)el.onclick=saveEdit;
  el=document.getElementById("editModal");if(el)el.onclick=function(e){if(e.target===el){editingId=null;render();showTab("manage");}};
}

function wireUndoButtons(){
  var uds=document.querySelectorAll("[data-undo]");
  for(var u=0;u<uds.length;u++){(function(b){b.onclick=function(){undoByIdx(parseInt(b.getAttribute("data-undo"),10));};})(uds[u]);}
}

function showTab(name){
  if((name==="result"||name==="manage"||name==="sync")&&!IS_ADMIN)name="table";
  activeTab=name;
  var tabs=document.querySelectorAll(".tab");
  for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle("active",tabs[i].getAttribute("data-tab")===name);
  var views=document.querySelectorAll(".view");
  for(var j=0;j<views.length;j++)views[j].classList.remove("active");
  var v=document.getElementById("v-"+name);if(v)v.classList.add("active");
}

// ── Actions ──────────────────────────────────────────────────────
function doJoin(){
  var inp=document.getElementById("joinName");
  var name=inp.value.trim();
  if(!name)return msg("joinMsg","Please enter your name.","err");
  for(var i=0;i<STATE.participants.length;i++){
    if(STATE.participants[i].name.toLowerCase()===name.toLowerCase())
      return msg("joinMsg",esc(name)+" has already joined.","err");
  }
  var used=usedCountries();
  var pool=COUNTRIES.filter(function(c){return used.indexOf(c.n)<0;});
  if(!pool.length)return msg("joinMsg","Every nation has been drawn!","err");
  var pick=pool[Math.floor(Math.random()*pool.length)];
  STATE.participants.push({id:"p_"+Date.now(),name:name,country:pick.n,flag:pick.f,points:0});
  saveState().then(function(){
    inp.value="";
    document.getElementById("joinMsg").innerHTML="";
    document.getElementById("joinReveal").innerHTML='<div class="reveal">'+
      '<div class="pot">The pot has chosen…</div>'+
      '<div style="margin:10px 0 6px;display:inline-block;animation:drawIn 0.7s cubic-bezier(.2,.8,.25,1.4) both">'+getFlag(pick.n,92)+'</div>'+
      '<div class="ctry">'+esc(pick.n)+'</div>'+
      '<div class="who"><b>'+esc(name)+'</b>, you\'re playing for '+esc(pick.n)+'!</div></div>';
    fireConfetti();
  });
}

function recordResult(){
  var aId=document.getElementById("teamA").value,bId=document.getElementById("teamB").value;
  var aScore=parseInt(document.getElementById("scoreA").value,10),bScore=parseInt(document.getElementById("scoreB").value,10);
  if(!aId||!bId)return msg("resultMsg","Select both nations.","err");
  if(aId===bId)return msg("resultMsg","A nation can't play itself.","err");
  if(isNaN(aScore)||isNaN(bScore)||aScore<0||bScore<0)return msg("resultMsg","Enter a valid score.","err");
  if(pickedStage!=="group"&&aScore===bScore)return msg("resultMsg","Knockout matches can't be level — use result after ET/pens.","err");
  addResult(aId,bId,aScore,bScore,pickedStage,false,null);
  saveState().then(function(){
    msg("resultMsg","Result logged!","ok");
    document.getElementById("scoreA").value=0;document.getElementById("scoreB").value=0;
    fireConfetti();
  });
}

function addResult(aId,bId,aScore,bScore,stage,auto,matchId){
  var st=STAGES[stage]||STAGES.group,A=findP(aId),B=findP(bId);
  if(!A||!B)return;
  var aPts=aScore*GOAL_PT,bPts=bScore*GOAL_PT;
  if(aScore>bScore)aPts+=st.win;else if(bScore>aScore)bPts+=st.win;else{aPts+=st.draw;bPts+=st.draw;}
  A.points+=aPts;B.points+=bPts;
  STATE.log.push({stage:stage,aId:aId,bId:bId,aScore:aScore,bScore:bScore,aPts:aPts,bPts:bPts,
    aCountry:A.country,bCountry:B.country,aName:A.name,bName:B.name,t:Date.now(),auto:!!auto,matchId:matchId||null});
}

function undoByIdx(idx){
  if(!confirm("Undo this result?"))return;
  var g=STATE.log[idx],A=findP(g.aId),B=findP(g.bId);
  if(A)A.points-=g.aPts;if(B)B.points-=g.bPts;
  STATE.log.splice(idx,1);
  saveState().then(function(){render();showTab("games");});
}

function saveEdit(){
  var p=findP(editingId);if(!p)return;
  var newName=document.getElementById("editName").value.trim();
  var newCountry=document.getElementById("editCountry").value;
  var newPoints=parseInt(document.getElementById("editPoints").value,10);
  if(!newName)return msg("editMsg","Name can't be empty.","err");
  if(!newCountry)return msg("editMsg","Select a nation.","err");
  for(var i=0;i<STATE.participants.length;i++){
    if(STATE.participants[i].id!==editingId&&STATE.participants[i].name.toLowerCase()===newName.toLowerCase())
      return msg("editMsg","Name already taken.","err");
  }
  var c=findCountry(newCountry);
  p.name=newName;p.country=newCountry;p.flag=c?c.f:p.flag;
  if(!isNaN(newPoints))p.points=Math.max(0,newPoints);
  for(var l=0;l<STATE.log.length;l++){
    if(STATE.log[l].aId===p.id){STATE.log[l].aCountry=p.country;STATE.log[l].aName=p.name;}
    if(STATE.log[l].bId===p.id){STATE.log[l].bCountry=p.country;STATE.log[l].bName=p.name;}
  }
  saveState().then(function(){editingId=null;render();showTab("manage");setTimeout(function(){msg("manageMsg","Saved!","ok");},50);});
}

function removeParticipant(id){
  var p=findP(id);if(!p)return;
  if(!confirm("Remove "+p.name+"?"))return;
  STATE.participants=STATE.participants.filter(function(x){return x.id!==id;});
  saveState().then(function(){render();showTab("manage");});
}

function resetAll(){
  if(!confirm("Reset the ENTIRE tournament? This cannot be undone."))return;
  if(!confirm("Are you sure?"))return;
  STATE={participants:[],log:[]};
  for(var i=0;i<SEED.length;i++){var s=SEED[i],c=findCountry(s.country);
    STATE.participants.push({id:"p"+i,name:s.name,country:s.country,flag:c?c.f:"🏳",points:0});}
  saveState().then(function(){render();showTab("manage");setTimeout(function(){msg("manageMsg","Reset complete.","info");},50);});
}

function unlockAdmin(){
  if(document.getElementById("adminCode").value.trim()===ADMIN_CODE){
    IS_ADMIN=true;localStorage.setItem('grg_admin','yes');render();showTab("manage");
  }else msg("adminMsg","Wrong code.","err");
}

// ── Auto sync ────────────────────────────────────────────────────
function doSync(){
  var btn=document.getElementById("syncBtn"),statusEl=document.getElementById("syncStatus"),logEl=document.getElementById("syncLog");
  if(btn){btn.disabled=true;btn.textContent="⏳ Fetching…";}
  if(statusEl)statusEl.innerHTML='<span class="dot"></span>Searching…';
  var nations=STATE.participants.map(function(p){return p.country+" ("+p.name+")";}).join(", ");
  var logged=STATE.log.filter(function(g){return g.auto&&g.matchId;}).map(function(g){return g.matchId;});
  var prompt="You are a World Cup 2026 results assistant. Today is "+new Date().toDateString()+".\n"+
    "Search the web for ALL completed (full-time) World Cup 2026 matches.\n"+
    "Sweepstake nations: "+nations+"\n"+
    "Return ONLY a valid JSON array of completed matches involving any of these nations:\n"+
    '[{"matchId":"HOME_vs_AWAY_YYYY-MM-DD","home":"country","away":"country","homeScore":0,"awayScore":0,"stage":"group"}]\n'+
    "stage = group|r32|r16|qf|sf|final. Only fully completed matches. Skip IDs: "+JSON.stringify(logged)+". Return [] if nothing new. JSON only, no markdown.";
  var newLines=[];
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(data){
    var text="";
    if(data&&data.content)for(var i=0;i<data.content.length;i++){if(data.content[i].type==="text")text+=data.content[i].text;}
    if(!text)throw new Error("No response");
    text=text.replace(/```json|```/gi,"").trim();
    var s=text.indexOf("["),e=text.lastIndexOf("]");
    if(s===-1||e===-1)throw new Error("No results found");
    var matches=JSON.parse(text.slice(s,e+1));
    if(!matches.length){newLines.push('<span class="skip">No new results found.</span>');}
    else{
      var added=0;
      for(var m=0;m<matches.length;m++){
        var match=matches[m],A=null,B=null;
        for(var p=0;p<STATE.participants.length;p++){
          if(match.home&&STATE.participants[p].country.toLowerCase()===match.home.toLowerCase())A=STATE.participants[p];
          if(match.away&&STATE.participants[p].country.toLowerCase()===match.away.toLowerCase())B=STATE.participants[p];
        }
        if(!A&&!B)continue;
        var dup=false;
        if(match.matchId)for(var l=0;l<STATE.log.length;l++){if(STATE.log[l].matchId===match.matchId){dup=true;break;}}
        if(dup){newLines.push('<span class="skip">⏭ Already logged: '+esc(match.home)+' '+match.homeScore+'–'+match.awayScore+' '+esc(match.away)+'</span>');continue;}
        if(A&&B){
          addResult(A.id,B.id,match.homeScore,match.awayScore,match.stage||"group",true,match.matchId);
          var last=STATE.log[STATE.log.length-1];
          newLines.push('<span class="added">✅ '+esc(A.country)+' '+match.homeScore+'–'+match.awayScore+' '+esc(B.country)+' → '+esc(A.name)+' +'+last.aPts+', '+esc(B.name)+' +'+last.bPts+'</span>');
        }else{
          var real=A||B,rs=A?match.homeScore:match.awayScore,os=A?match.awayScore:match.homeScore,on=A?match.away:match.home;
          var st2=STAGES[match.stage]||STAGES.group,pts=rs*GOAL_PT;
          if(rs>os)pts+=st2.win;else if(rs===os)pts+=st2.draw;
          real.points+=pts;
          STATE.log.push({stage:match.stage||"group",aId:real.id,bId:"ext",aScore:rs,bScore:os,aPts:pts,bPts:0,
            aCountry:real.country,bCountry:on,aName:real.name,bName:"",t:Date.now(),auto:true,matchId:match.matchId||null});
          newLines.push('<span class="added">✅ '+esc(real.country)+' '+rs+'–'+os+' '+esc(on)+' → '+esc(real.name)+' +'+pts+'pts</span>');
        }
        added++;
      }
      if(added===0)newLines.push('<span class="skip">All matches already logged.</span>');
      else{newLines.push('<span class="added">— '+added+' new result'+(added===1?'':'s')+' added —</span>');fireConfetti();}
    }
    STATE.lastSync=Date.now();
    return saveState();
  })
  .then(function(){if(statusEl)statusEl.innerHTML='<span class="dot"></span>Last sync: just now';})
  .catch(function(err){newLines.push('<span class="warn">⚠ '+esc(err.message)+'</span>');if(statusEl)statusEl.innerHTML='<span class="dotOff"></span>Sync failed';})
  .then(function(){
    syncLines=newLines.concat(syncLines).slice(0,50);
    if(logEl)logEl.innerHTML=syncLines.join('<br>');
    if(btn){btn.disabled=false;btn.textContent="⚡ Sync now";}
  });
}

// ── Confetti ─────────────────────────────────────────────────────
function fireConfetti(){
  var cv=document.getElementById("confetti");if(!cv)return;
  var ctx=cv.getContext("2d");cv.width=window.innerWidth;cv.height=window.innerHeight;
  var cols=["#F2C14E","#1FB873","#EAF2EC","#169063","#C99A2E"],pts=[];
  for(var i=0;i<120;i++)pts.push({x:window.innerWidth/2+(Math.random()-.5)*100,y:window.innerHeight*.32,
    vx:(Math.random()-.5)*11,vy:Math.random()*-13-4,r:Math.random()*6+3,
    c:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6,vr:(Math.random()-.5)*.4,life:0});
  var fr=0;
  function tick(){ctx.clearRect(0,0,cv.width,cv.height);var alive=false;
    for(var i=0;i<pts.length;i++){var p=pts[i];p.vy+=.4;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;
      if(p.y<window.innerHeight+30)alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
      ctx.globalAlpha=Math.max(0,1-p.life/90);ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);ctx.restore();}
    fr++;if(alive&&fr<130)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);}
  tick();
}

function msg(id,text,type){
  var el=document.getElementById(id);if(!el)return;
  el.innerHTML='<div class="msg '+type+'">'+text+'</div>';
  if(type!=="err")setTimeout(function(){if(el)el.innerHTML="";},7000);
}

// ── Init ─────────────────────────────────────────────────────────
loadState().then(function(){
  render();
  startLiveSync();
}).catch(function(err){
  document.getElementById("loadingScreen").innerHTML=
    '<div style="color:#E2574C;font-family:sans-serif;text-align:center;padding:40px">'+
    'Failed to load: '+err.message+'<br><br>'+
    '<button onclick="location.reload()" style="padding:10px 20px;cursor:pointer;margin-top:10px">Retry</button></div>';
});

})();
</script>
